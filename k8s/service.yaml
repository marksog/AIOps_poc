apiVersion: v1
kind: Service
metadata:
  name: checkout-svc
  namespace: default
  labels:
    app: checkout-svc
spec:
  type: ClusterIP   # internal only; we reach it via port-forward in Phase 6
  selector:
    app: checkout-svc
  ports:
    - name: http     # NAMED port — Phase 7's ServiceMonitor matches by this name
      port: 80
      targetPort: 8000
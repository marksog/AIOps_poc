name: build-and-deploy

# Deploy on push to main. The OIDC trust policy is locked to this branch.
on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "Dockerfile"
      - "requirements.txt"
      - "k8s/**"
      - ".github/workflows/**"
  workflow_dispatch: {} # lets you trigger manually from the GitHub UI

# These permissions are REQUIRED for OIDC. Without id-token: write,
# GitHub won't mint the identity token and auth fails.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: aiops-eks
  ECR_REPO: checkout-svc

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Exchange GitHub's OIDC token for temporary AWS credentials.
      # No access keys stored anywhere.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          # Tag with the git SHA for immutable, traceable deploys.
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region "$AWS_REGION" --name "$CLUSTER_NAME"

      - name: Deploy to EKS
        run: |
          # Substitute the freshly built image into the manifest and apply.
          sed "s|<ECR_IMAGE>|$IMAGE|g" k8s/deployment.yaml | kubectl apply -f -
          # Wait for the rollout — fail the pipeline if it doesn't go healthy.
          kubectl rollout status deployment/checkout-svc --timeout=120s

      - name: Verify
        run: kubectl get pods -l app=checkout-svc